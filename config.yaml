# ══════════════════════════════════════════════════════════════════════════════
# config.yaml — Configuración de Ciudad
# Plataforma de Inversión Estratégica en Ciudades Colombianas · UdeA TG 2026
#
# Para replicar en otra ciudad, edita sólo este archivo.
# Ejemplo Bogotá: unidad_territorial: "localidad"
# Ejemplo Cali:   unidad_territorial: "corregimiento"
# ══════════════════════════════════════════════════════════════════════════════

ciudad:
  nombre:               "Medellín"
  departamento:         "Antioquia"
  codigo_dane:          "05001"
  # Nombre de la unidad territorial de análisis.
  # Define el nombre de columna usado en todos los CSVs, mapas y logs.
  unidad_territorial:   "comuna"
  # Sistema de referencia de coordenadas (EPSG code).
  crs:                  "EPSG:4326"
  # Coordenadas del centroide de la ciudad (para centrar mapas).
  centro:
    lat: 6.2442
    lon: -75.5812

# ── Rutas relativas a la raíz del proyecto ────────────────────────────────────
rutas:
  datos_climaticos:     "pluviometrica"          # Estaciones SIATA / CSV pluviométricos
  datos_sociales:       "ModeloDatos/ModeloDatos/data"  # ECV, IPM, IML (raw y processed)
  procesados:           "data/processed"          # Artefactos CSV generados por los scripts
  modelos:              "models"                  # Modelo .pkl, métricas, SHAP
  logs:                 "logs"                    # Archivos de log de ejecución
  geo:                  "data/geo"                # Archivos geoespaciales (.geojson, .shp)

# ── Unidades territoriales con centroides (WGS84) ─────────────────────────────
# Lista completa de unidades de la ciudad. El campo 'nombre' debe coincidir
# exactamente con el valor de la columna 'unidad_territorial' en los CSV de salida.
